Name: ImageSafari Crop Image Collection
Description: >
  The ImageSafari Crop Image Collection is a curated set of 6,081,555 field
  photographs representing 18 staple food and legume crops. Images were
  collected at research stations and farms across eight African countries
  through 15 research centres. The collection supports computer-vision
  research in crop identification, phenotyping, agricultural monitoring,
  dataset curation, domain generalization, and related applications.
Documentation: >
  Dataset documentation, access instructions, metadata descriptions, curation
  methods, and known characteristics are available at
  https://github.com/CIAT-Artemis/imagesafari-crop-images/blob/main/imagesafari-crop-images.md.
Contact: https://github.com/CIAT-Artemis/imagesafari-crop-images/issues
ManagedBy: "[Alliance of Bioversity International and CIAT](https://alliancebioversityciat.org/)"
UpdateFrequency: New curated releases are published as they become available.
